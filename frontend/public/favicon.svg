<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0F172A"/>
  <!-- Bar chart columns -->
  <rect x="4" y="18" width="5" height="10" rx="1" fill="#3B82F6" opacity="0.6"/>
  <rect x="11" y="12" width="5" height="16" rx="1" fill="#3B82F6" opacity="0.8"/>
  <rect x="18" y="8" width="5" height="20" rx="1" fill="#3B82F6"/>
  <!-- Credible interval tick on tallest bar -->
  <rect x="17" y="6" width="7" height="1.5" rx="0.75" fill="#93C5FD"/>
  <rect x="17" y="17" width="7" height="1.5" rx="0.75" fill="#93C5FD"/>
  <!-- Trend line -->
  <polyline points="6,20 13,14 20,9 27,5" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend dot -->
  <circle cx="27" cy="5" r="1.8" fill="#F59E0B"/>
</svg>
